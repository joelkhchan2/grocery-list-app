<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#faf6ef">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Groceries">
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="icon" href="assets/icon-192.png">
  <link rel="apple-touch-icon" href="assets/icon-192.png">
  <link rel="stylesheet" href="src/style.css">
  <script>
    // Pre-paint bootstrap: set theme + per-device customization before the app JS runs
    // to avoid a flash. Mirrors theme.js applyCustom (kept in sync deliberately).
    try {
      var root = document.documentElement;
      var t = localStorage.getItem("glTheme") || "terracotta";
      var auto = localStorage.getItem("glAutoDark") !== "0";
      var darkSys = matchMedia("(prefers-color-scheme: dark)").matches;
      root.dataset.theme = (auto && darkSys) ? "midnight" : t;
      var ac = localStorage.getItem("glColAc"); if (ac) root.style.setProperty("--ac", ac);
      var tx = localStorage.getItem("glColTx"); if (tx) root.style.setProperty("--tx", tx);
      var bg = localStorage.getItem("glColBg"); if (bg) root.style.setProperty("--bg", bg);
      // Derive dependent tokens (mirror theme.js applyCustom) so a custom dark bg doesn't
      // flash unreadable (preset-white) cards before the module runs.
      var lum = function (h) { var m = /^#?([0-9a-f]{6})$/i.exec(h || ""); if (!m) return null;
        var n = parseInt(m[1], 16), c = function (s) { var v = ((n >> s) & 255) / 255;
        return v <= 0.03928 ? v / 12.92 : Math.pow((v + 0.055) / 1.055, 2.4); };
        return 0.2126 * c(16) + 0.7152 * c(8) + 0.0722 * c(0); };
      if (bg) {
        var dark = (lum(bg) == null ? 1 : lum(bg)) < 0.5, into = dark ? "white" : "black";
        root.style.setProperty("--card", "color-mix(in srgb, " + bg + " 88%, " + into + ")");
        root.style.setProperty("--border", "color-mix(in srgb, " + bg + " 74%, " + into + ")");
        root.style.setProperty("--sub", "color-mix(in srgb, " + (tx || (dark ? "white" : "black")) + " 60%, " + bg + ")");
      }
      if (ac) root.style.setProperty("--ontop", (lum(ac) == null ? 0 : lum(ac)) > 0.5 ? "#1a1a1a" : "#ffffff");
      var fonts = {
        system: '-apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif',
        rounded: '"Nunito", "Segoe UI", system-ui, sans-serif',
        serif: 'Georgia, "Times New Roman", serif',
        mono: 'ui-monospace, "SF Mono", Menlo, Consolas, monospace'
      };
      var f = localStorage.getItem("glFont");
      if (f && fonts[f]) {
        root.style.setProperty("--font-stack", fonts[f]);
        if (f === "rounded") {
          var nl = document.createElement("link");
          nl.id = "gl-font-rounded"; nl.rel = "stylesheet";
          nl.href = "https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&display=swap";
          document.head.appendChild(nl);
        }
      }
      var fs = parseFloat(localStorage.getItem("glFontScale"));
      if (fs && fs !== 1) root.style.fontSize = (fs * 100) + "%";
    } catch (e) {}
  </script>
  <title>Our Grocery Lists</title>
</head>
<body>
  <div id="status" role="status" hidden></div>
  <div id="app"><p class="loading">Loading…</p></div>
  <script type="module" src="src/main.js"></script>
  <script>
    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.register("sw.js");
      // When a newly-deployed service worker takes over, reload once so the page runs
      // the fresh code. Only when a controller already exists (an update, not first install),
      // and guarded against reload loops.
      if (navigator.serviceWorker.controller) {
        let reloaded = false;
        navigator.serviceWorker.addEventListener("controllerchange", () => {
          if (!reloaded) { reloaded = true; location.reload(); }
        });
      }
    }
    // If the app module never boots (offline / CDN unreachable), replace the silent hang with a message.
    setTimeout(() => {
      const el = document.querySelector("#app .loading");
      if (el) el.textContent = "Can't reach the server — check your connection and reload.";
    }, 6000);
  </script>
</body>
</html>

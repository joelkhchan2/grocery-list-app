name: keepalive
# Daily ping so the free Supabase project doesn't pause after ~7 days idle.
# Uses only the public URL + publishable key already committed in config.js
# (read at runtime so this stays in sync). No secrets.
on:
  schedule:
    - cron: "23 12 * * *"   # ~08:23 ET daily
  workflow_dispatch: {}
jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Ping Supabase REST
        run: |
          URL=$(grep -oE 'https://[a-z0-9]+\.supabase\.co' config.js | head -1)
          KEY=$(grep -oE 'sb_publishable_[A-Za-z0-9_-]+' config.js | head -1)
          if [ -z "$URL" ] || [ -z "$KEY" ]; then echo "could not read config.js"; exit 1; fi
          CODE=$(curl -s -o /dev/null -w "%{http_code}" \
            "$URL/rest/v1/lists?select=id&limit=1" \
            -H "apikey: $KEY" -H "Authorization: Bearer $KEY")
          echo "keepalive ping -> HTTP $CODE"
          # 200 (RLS returns []) or 401/403 all count as activity; only fail on no response.
          [ -n "$CODE" ] && [ "$CODE" != "000" ]
